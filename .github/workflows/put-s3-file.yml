name: Put S3 file

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  put-s3-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::883429660395:role/GithubActionsS3Role
          role-session-name: github-actions-oidc-session
          aws-region: us-east-1 

      - name: Put S3 file
        run: |
          aws s3 cp test.txt s3://script-bootstrap/test.txt